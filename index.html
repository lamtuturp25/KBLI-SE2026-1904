<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
KBLI SE2026 —
Aktivitas Ekonomi yang Sering Ditemukan di Bangka Tengah
</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui;
}

body{
margin:0;
background:#f7f9fc;
}

.header{

background:
linear-gradient(
135deg,
#F28C28,
#2D9CDB
);

color:white;

padding:34px;

text-align:center;

}

.header h1{
margin:0;
}

.subtitle{
margin-top:10px;
font-size:20px;
font-weight:700;
}

.container{

max-width:1500px;

margin:auto;

padding:20px;

}

.controls{

display:grid;

grid-template-columns:
2fr
300px
150px;

gap:12px;

position:sticky;

top:0;

background:#f7f9fc;

padding-bottom:12px;

z-index:10;

}

input,
select,
button{

padding:16px;

border:none;

border-radius:12px;

font-size:16px;

}

input{

width:100%;

box-shadow:
0 4px 15px rgba(0,0,0,.08);

}

select{

box-shadow:
0 4px 15px rgba(0,0,0,.08);

}

.reset{

background:#e74c3c;

color:white;

}

.info{

margin:

18px
0;

color:#666;

}

.table-wrap{

overflow:auto;

background:white;

border-radius:18px;

box-shadow:
0 8px 20px rgba(0,0,0,.06);

}

table{

width:100%;

border-collapse:collapse;

}

thead{

position:sticky;

top:80px;

z-index:5;

}

th{

background:#2D9CDB;

color:white;

padding:16px;

text-align:left;

}

td{

padding:14px;

vertical-align:top;

border-bottom:
1px solid #eee;

}

tr:hover{

background:#fafcff;

}

.kode{

font-weight:800;

color:#F28C28;

}

.copy{

background:#2D9CDB;

color:white;

padding:10px;

}

.empty{

padding:80px;

text-align:center;

color:#777;

}

.warning{

margin-bottom:15px;

background:#fff7df;

padding:14px;

border-radius:12px;

}

.footer{

padding:30px;

text-align:center;

color:#777;

}

.top{

position:fixed;

bottom:20px;

right:20px;

width:50px;

height:50px;

border-radius:999px;

background:#F28C28;

color:white;

display:none;

}

@media(max-width:900px){

.controls{

grid-template-columns:1fr;

}

thead{

top:170px;

}

}

</style>

</head>

<body>

<div class="header">

<h1>
🔎 KBLI SE2026
</h1>

<div class="subtitle">

Aktivitas Ekonomi yang Sering Ditemukan di Bangka Tengah

</div>

</div>



<div class="container">

<div class="controls">

<input
id="search"
placeholder="Contoh pencarian: rusip, bengkel motor, petani jagung, warung sembako, pabrik CPO, kemplang, penggilingan ikan..."
>

<select id="kategori">

<option value="">
Semua Kategori
</option>

</select>

<button
class="reset"
onclick="resetFilter()"
>

Reset

</button>

</div>


<div
class="info"
id="jumlah"
>

Memuat...

</div>


<div class="warning">

Daftar ini merupakan panduan KBLI untuk aktivitas ekonomi yang sering ditemukan di Bangka Tengah dan bukan daftar KBLI nasional lengkap.

</div>



<div class="table-wrap">

<table>

<thead>

<tr>

<th>No</th>

<th>Kode</th>

<th>Nama KBLI</th>

<th>Aktivitas</th>

<th>Contoh</th>

<th>Kategori</th>

<th>Aksi</th>

</tr>

</thead>

<tbody
id="hasil"
>

</tbody>

</table>

</div>

</div>


<button
class="top"
id="top"
onclick="window.scrollTo({top:0,behavior:'smooth'})"
>

↑

</button>


<div class="footer">

KBLI SE2026 • Bangka Tengah

</div>


<script>

let DATA=[]

const hasil=
document.getElementById("hasil")

const search=
document.getElementById("search")

const kategori=
document.getElementById("kategori")

const jumlah=
document.getElementById("jumlah")

fetch("./kbli_clean.json")

.then(r=>r.json())

.then(d=>{

DATA=d

isiKategori()

filter()

})



function isiKategori(){

[
...new Set(
DATA.map(
x=>x.kategori
)
)

]

.sort()

.forEach(

k=>{

kategori.innerHTML+=
`<option>${k}</option>`

}

)

}



function filter(){

let q=
search.value
.toLowerCase()

let k=
kategori.value


let rows=

DATA

.filter(

x=>

(!k||

x.kategori===k)

&&

JSON
.stringify(x)
.toLowerCase()
.includes(q)

)


render(
rows
)

}



function render(
rows
){

jumlah.innerHTML=
`<b>${rows.length}</b> hasil ditemukan`

if(
rows.length===0
){

hasil.innerHTML=
`
<tr>

<td
colspan=7
class='empty'
>

Tidak ditemukan

</td>

</tr>
`

return

}

hasil.innerHTML=

rows

.slice(0,300)

.map(

(x,i)=>

`

<tr>

<td>
${i+1}
</td>

<td
class='kode'
>

${x.kode_kbli}

</td>

<td>

${x.nama_kbli}

</td>

<td>

${x.aktivitas_ekonomi||"-"}

</td>

<td>

${x.contoh_usaha||"-"}

</td>

<td>

${x.kategori}

</td>

<td>

<button
class='copy'
onclick='copy("${x.kode_kbli}")'
>

📋 Copy

</button>

</td>

</tr>

`

)

.join("")

}



function copy(
k
){

navigator
.clipboard
.writeText(
k
)

}



function resetFilter(){

search.value=""

kategori.value=""

filter()

}



search
.addEventListener(
"input",
filter
)

kategori
.addEventListener(
"change",
filter
)



window
.addEventListener(
"scroll",

()=>{

document
.getElementById(
"top"
)

.style.display=

window.scrollY>500

?

"block"

:

"none"

}

)

</script>

</body>

</html>
